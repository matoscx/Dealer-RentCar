<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>RentCar - Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="brand">
                <span class="material-symbols-outlined logo-icon">lock</span>
                <h1>Entrar</h1>
            </div>
            <form id="loginForm">
                <div class="input-group">
                    <span class="material-symbols-outlined">mail</span>
                    <input type="email" id="email" placeholder="admin@rentcar.com" required>
                </div>
                <div class="input-group">
                    <span class="material-symbols-outlined">key</span>
                    <input type="password" id="pass" placeholder="12345" required>
                </div>
                <button type="submit" class="btn-login">Ingresar</button>
            </form>
            <p class="footer">¿No tienes cuenta? <a href="register.html">Regístrate</a></p>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            // Simulación de login exitoso
            localStorage.setItem('currentUser', JSON.stringify({name: "Admin", email: email}));
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
