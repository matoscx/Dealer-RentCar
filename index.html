<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RentCar Express - Catálogo</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>
<body class="dashboard-body">
    <nav class="navbar">
        <div class="nav-logo">
            <span class="material-symbols-outlined">directions_car</span>
            <h2>Rent<span>Car</span></h2>
        </div>
        <ul class="nav-links">
            <li><a href="index.html" class="active">Vehículos</a></li>
            <li><a href="admin.html">Panel Admin</a></li>
            <li id="user-auth-link"><a href="login.html" class="logout-btn">Iniciar Sesión</a></li>
        </ul>
    </nav>

    <header class="hero-mini">
        <h1>Nuestra Flota <span>Premium</span></h1>
        <p>Selecciona el auto ideal para tu viaje. Inicia sesión para confirmar tu reserva.</p>
    </header>

    <div class="filter-bar">
        <button class="filter-btn active" onclick="filterAction('todos', this)">Todos</button>
        <button class="filter-btn" onclick="filterAction('economico', this)">Económico</button>
        <button class="filter-btn" onclick="filterAction('suv', this)">SUV</button>
        <button class="filter-btn" onclick="filterAction('lujo', this)">Lujo</button>
    </div>

    <div id="vehicleGrid" class="car-grid">
        <!-- JS cargará los autos aquí -->
    </div>

    <script src="app.js"></script>
</body>
</html>
