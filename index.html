<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RentCar Express | Iniciar sesión</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body class="auth-page" data-page="login">
  <main class="glass-box">
    <h1>Bienvenido a <span>RentCar Express</span></h1>
    <p class="muted">Inicia sesión para reservar tu vehículo ideal.</p>
    <form id="loginForm" class="stack-md">
      <label class="input-group">
        <span class="material-symbols-outlined">mail</span>
        <input type="email" id="email" placeholder="Correo electrónico" required>
      </label>
      <label class="input-group">
        <span class="material-symbols-outlined">key</span>
        <input type="password" id="pass" placeholder="Contraseña" required>
      </label>
      <button type="submit" class="btn-primary">Ingresar</button>
    </form>
    <p class="footer-text"><a href="forgot-password.html">¿Olvidaste tu contraseña?</a></p>
    <p class="footer-text">¿No tienes cuenta? <a href="register.html">Regístrate</a></p>
    <p class="demo-hint">Demo admin: admin@rentcar.com / Admin123*</p>
  </main>
  <script src="app.js"></script>
</body>
</html>
